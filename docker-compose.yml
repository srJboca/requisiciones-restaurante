version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: requisitions_db
      MYSQL_USER: api_user
      MYSQL_PASSWORD: apipassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://api_user:apipassword@db:3306/requisitions_db
      - SECRET_KEY=supersecretkey_change_in_production
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    ports:
      - "5001:5000"
    environment:
      - API_URL=http://backend:8000
      - FLASK_APP=app.py
      - FLASK_DEBUG=1
      - SECRET_KEY=frontendsecret_change_in_production
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  db_data:
