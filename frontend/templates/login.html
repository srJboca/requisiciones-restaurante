{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 5vh auto;">
    <h2 style="margin-bottom: 1.5rem; text-align: center;">{{ _('Login') }}</h2>
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label class="form-label" for="username">{{ _('Username') }}</label>
            <input type="text" class="form-control" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">{{ _('Password') }}</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">{{ _('Login') }}</button>
    </form>
</div>
{% endblock %}
