{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 420px; margin: 5vh auto;">
    <h2 style="margin-bottom: 0.5rem; text-align: center;">{{ _('Login') }}</h2>
    <p style="text-align: center; font-size: 0.85rem; color: var(--text-light); margin-bottom: 1.5rem;">
        {{ _('Company users:') }} <code>username@domain</code> &nbsp;|&nbsp; {{ _('SuperAdmin:') }} <code>superadmin</code>
    </p>
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label class="form-label" for="username">{{ _('Username') }}</label>
            <input type="text" class="form-control" id="username" name="username"
                   placeholder="username@company" required autocomplete="username">
        </div>
        <div class="form-group">
            <label class="form-label" for="password">{{ _('Password') }}</label>
            <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">{{ _('Login') }}</button>
    </form>
</div>
<script>
    const API_URL = "{{ API_URL }}";
    const loginForm = document.querySelector('form');
    const submitBtn = loginForm.querySelector('button');
    const originalText = submitBtn.innerText;

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> {{ _("Waking up system...") }}';

        let ready = false;
        let attempts = 0;
        const maxAttempts = 5; // Total ~10 seconds wait

        while (!ready && attempts < maxAttempts) {
            try {
                // Try to ping the health endpoint
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);
                
                const res = await fetch(`${API_URL}/health`, { 
                    mode: 'cors',
                    signal: controller.signal 
                });
                
                if (res.ok) {
                    ready = true;
                }
            } catch (err) {
                console.log("System sleeping, retrying...");
                attempts++;
                if (attempts < maxAttempts) {
                    await new Promise(r => setTimeout(r, 2000));
                }
            }
        }

        if (ready) {
            loginForm.submit();
        } else {
            submitBtn.disabled = false;
            submitBtn.innerText = originalText;
            alert("{{ _('System is still sleeping. Please try again in a moment.') }}");
        }
    });
</script>
{% endblock %}
