{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 420px; margin: 5vh auto; border-top: 4px solid var(--accent);">
    <h2 style="margin-bottom: 0.5rem; text-align: center;">{{ _('System Setup Wizard') }}</h2>
    <p style="text-align: center; font-size: 0.9rem; color: var(--text-light); margin-bottom: 1.5rem;">
        {{ _('Welcome! Since this is the first run, please set the password for the SuperAdmin account to get started.') }}
    </p>
    <form method="POST" action="{{ url_for('setup_wizard') }}">
        <div class="form-group">
            <label class="form-label" for="password">{{ _('SuperAdmin Password') }}</label>
            <input type="password" class="form-control" id="password" name="password" required autocomplete="new-password">
        </div>
        <div class="form-group">
            <label class="form-label" for="confirm">{{ _('Confirm Password') }}</label>
            <input type="password" class="form-control" id="confirm" name="confirm" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; background-color: var(--accent);">{{ _('Complete Setup') }}</button>
    </form>
</div>
{% endblock %}
